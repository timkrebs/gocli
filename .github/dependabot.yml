version: 2

updates:
  # Keep Go module dependencies up to date.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - dependencies
    # Group all non-major updates into a single PR to reduce noise.
    groups:
      all-dependencies:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - dependencies
      - github-actions
    groups:
      all-actions:
        update-types:
          - minor
          - patch
