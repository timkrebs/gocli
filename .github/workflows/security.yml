name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan weekly on Monday at 08:00 UTC even without code changes,
    # so newly disclosed CVEs are caught promptly.
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write   # required for CodeQL to upload SARIF results

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Use the latest stable Go so govulncheck runs against a fully-patched
          # stdlib. Using go-version-file: go.mod would pin to go 1.23.0 which
          # carries GO-2025-3956 (fixed go1.23.12) and GO-2025-3750 (fixed
          # go1.23.10) — both unrelated to our library code.
          go-version: stable
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          # Use the security-extended query suite for broader coverage.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:go
