# golangci-lint v1 configuration (installed by golangci/golangci-lint-action@v6).
# v1 format: top-level linters-settings, disable-all, issues.exclude-rules.

linters:
  disable-all: true
  enable:
    # Correctness
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    # Style / quality
    - revive
    - misspell
    - unconvert
    - prealloc
    - tparallel

    # Security
    - gosec

linters-settings:
  revive:
    severity: warning
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
      - name: unexported-return
      - name: error-return
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-naming
      - name: increment-decrement
      - name: var-declaration

  misspell:
    locale: US

  gosec:
    excludes:
      - G304  # file path from taint input — acceptable in a CLI library
    severity: medium
    confidence: medium

  errcheck:
    exclude-functions:
      - (io.Writer).Write
      - fmt.Fprint
      - fmt.Fprintln
      - fmt.Fprintf

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Test files get relaxed rules.
    - path: "_test\\.go$"
      linters:
        - gosec
        - errcheck
        - govet

    # MockCommand tracking fields (RunCalled, RunArgs, etc.) are written inside
    # the package but consumed by external test code — unused is a false positive.
    - path: "command_mock\\.go$"
      linters:
        - unused

run:
  timeout: 5m
  tests: true
